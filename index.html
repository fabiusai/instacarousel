        window.applyTextWidthFromCanvasResize = function(e) { 
            const o = e.target || e; 
            if (!o || !o.isCustomTextAsset || e.action === 'drag') return false; 
            if (Math.abs(o.scaleX - TEXT_OBJECT_SCALE) <= 0.015 && Math.abs(o.scaleY - TEXT_OBJECT_SCALE) <= 0.015) return false; 
            
            const w = Math.max(100, o.width * o.scaleX); 
            const c = o.getCenterPoint(); 
            o.set({ left: c.x, top: c.y, scaleX: TEXT_OBJECT_SCALE, scaleY: TEXT_OBJECT_SCALE }); 
            o.setCoords(); 
            applyTextToCanvas(false, { targetWidth: w, center: c }); 
            return true; 
        };
        
        async function applyTextToCanvas(isNew = false, fit = null) {
            textApplyRevision++; 
            const rev = textApplyRevision; 
            const obj = fCanvas.getActiveObject(); 
            if (!isNew && (!obj || !obj.isCustomTextAsset)) return;
            
            const html = quill.root.innerHTML.replace(/<p><br><\/p>$/i, '').replace(/<br>$/i, '');
            const cw = Math.max(100, fit ? fit.targetWidth : parseFloat(document.getElementById('rng-width').value)); 
            const fz = Math.max(10, parseFloat(document.getElementById('rng-fontsize').value)); 
            const lh = document.getElementById('rng-lineheight').value; 
            const ffa = document.getElementById('font-family').value; 
            const al = document.getElementById('text-align-hidden').value;
            
            const rc = document.getElementById('render-text-container'); 
            rc.style.fontFamily = ffa; 
            rc.style.fontSize = fz + 'px'; 
            rc.style.lineHeight = lh; 
            rc.style.textAlign = al; 
            rc.style.maxWidth = cw + 'px'; 
            document.getElementById('render-text-content').innerHTML = html;
            
            await new Promise(r => requestAnimationFrame(r)); 
            const cvs = await html2canvas(rc, { backgroundColor: null, scale: TEXT_RENDER_SCALE, logging: false });
            
            if (rev !== textApplyRevision) return; 
            const tctx = cvs.getContext('2d'); 
            const imgd = tctx.getImageData(0, 0, cvs.width, cvs.height).data; 
            let tx = null, bx = null, lx = null, rx = null;
            
            for (let y = 0; y < cvs.height; y++) { 
                for (let x = 0; x < cvs.width; x++) { 
                    if (imgd[(y * cvs.width + x) * 4 + 3] > 0) { 
                        if (tx === null) tx = y; 
                        bx = y; 
                        if (lx === null || x < lx) lx = x; 
                        if (rx === null || x > rx) rx = x; 
                    } 
                } 
            }
            
            const tcv = document.createElement('canvas'); 
            if (tx !== null) { 
                const p = 6; 
                tx = Math.max(0, tx - p); 
                bx = Math.min(cvs.height - 1, bx + p); 
                lx = Math.max(0, lx - p); 
                rx = Math.min(cvs.width - 1, rx + p); 
                tcv.width = rx - lx + 1; 
                tcv.height = bx - tx + 1; 
                tcv.getContext('2d').drawImage(cvs, lx, tx, tcv.width, tcv.height, 0, 0, tcv.width, tcv.height); 
            } else { 
                tcv.width = 1; 
                tcv.height = 1; 
            }
            
            fabric.Image.fromURL(tcv.toDataURL('image/png'), i => {
                if (rev !== textApplyRevision) return;
                const gs = { font: ffa, size: fz, lh, align: al, width: cw };
                
                if (!isNew && obj && obj.isCustomTextAsset) { 
                    const ctr = fit && fit.center ? fit.center : obj.getCenterPoint(); 
                    obj.setElement(i.getElement()); 
                    obj.set({ width: i.width, height: i.height, left: ctr.x, top: ctr.y, scaleX: TEXT_OBJECT_SCALE, scaleY: TEXT_OBJECT_SCALE, sourceHTML: html, globalSettings: gs }); 
                    fCanvas.setActiveObject(obj); 
                } else { 
                    const vp = document.getElementById('canvas-viewport'); 
                    const cx = vp ? (vp.scrollLeft + vp.clientWidth / 2) / (fCanvas.getZoom() || 1) : state.frameWidth / 2; 
                    i.set({ left: cx, top: state.viewportHeight / 2, originX: 'center', originY: 'center', scaleX: TEXT_OBJECT_SCALE, scaleY: TEXT_OBJECT_SCALE, isCustomTextAsset: true, sourceHTML: html, globalSettings: gs }); 
                    i.setControlsVisibility({ mt: true, mb: true, ml: true, mr: true, mtr: true }); 
                    fCanvas.add(i); 
                    fCanvas.setActiveObject(i); 
                }
                fCanvas.requestRenderAll(); 
                debouncedSyncPreview(); 
                document.getElementById('text-auto-status').innerText = 'Fatto';
            });
        }

        /* ==========================================================================
           9. ESPORTAZIONE E SALVATAGGIO
           ========================================================================== */
        async function extractFramesAsBlobs(opt = {}) {
            if (fCanvas && document.getElementById('modal-editor').classList.contains('flex')) {
                state.globalOverlayJSON = getGlobalOverlayJSON();
            }
            if (document.fonts) await document.fonts.ready; 
            const blobs = []; 
            const cvs = document.createElement('canvas'); 
            const ctx = cvs.getContext('2d'); 
            cvs.width = 1080; 
            cvs.height = 1350; 
            ctx.imageSmoothingEnabled = true; 
            ctx.imageSmoothingQuality = 'high';
            
            const totW = 1080 * state.finalFramesCount; 
            const oC = await getUnifiedOverlayCanvas(totW, 1350);
            
            for (let i = 0; i < state.finalFramesCount; i++) {
                ctx.clearRect(0, 0, 1080, 1350); 
                ctx.fillStyle = 'white'; 
                ctx.fillRect(0, 0, 1080, 1350); 
                const fi = getFrameInfo(i);
                
                // Disegna Sfondo Originale
                if (fi.type === 'image' && state.imgObj) {
                    const srcX = ((fi.imageIndex * state.frameWidth) - state.x) / state.scale;
                    const srcY = Math.abs(state.y) / state.scale;
                    const srcW = state.frameWidth / state.scale;
                    const srcH = state.viewportHeight / state.scale;
                    ctx.drawImage(state.imgObj, srcX, srcY, srcW, srcH, 0, 0, 1080, 1350);
                }
                
                // Disegna Sfumatura (Offline per export)
                drawSlideGradient(ctx, i, 1080, 1350);
                
                // Disegna Oggetti Sospesi (Testi, Forme)
                if (oC) ctx.drawImage(oC, i * 1080, 0, 1080, 1350, 0, 0, 1080, 1350);
                
                blobs.push(await new Promise(r => cvs.toBlob(r, opt.mimeType || 'image/png', opt.quality || 1.0)));
            } 
            return blobs;
        }

        function exportCarousel(btn) { 
            withButtonState(btn, "ZIP...", async () => { 
                const b = await extractFramesAsBlobs({ mimeType: 'image/png' }); 
                const z = new JSZip(); 
                b.forEach((x, i) => z.file(`${state.projectName}_${String(i + 1).padStart(2, '0')}.png`, x)); 
                const zb = await z.generateAsync({ type: "blob" }); 
                const a = document.createElement('a'); 
                a.href = URL.createObjectURL(zb); 
                a.download = `${state.projectName}_carousel.zip`; 
                a.click(); 
            }); 
        }

        function exportFullEditedImage(btn) { 
            withButtonState(btn, "PNG...", async () => { 
                const b = await extractFramesAsBlobs(); 
                const c = document.createElement('canvas'); 
                const ctx = c.getContext('2d'); 
                c.width = 1080 * b.length; 
                c.height = 1350; 
                ctx.fillStyle = 'white'; 
                ctx.fillRect(0, 0, c.width, c.height); 
                for (let i = 0; i < b.length; i++) { 
                    const img = await new Promise(r => { 
                        const i2 = new Image(); 
                        i2.onload = () => r(i2); 
                        i2.src = URL.createObjectURL(b[i]); 
                    }); 
                    ctx.drawImage(img, i * 1080, 0, 1080, 1350); 
                } 
                const blob = await new Promise(r => c.toBlob(r)); 
                const a = document.createElement('a'); 
                a.href = URL.createObjectURL(blob); 
                a.download = `${state.projectName}_intera.png`; 
                a.click(); 
            }); 
        }

        function exportProjectJSON(btn) { 
            withButtonState(btn, "Salvataggio...", async () => { 
                if (fCanvas && document.getElementById('modal-editor').classList.contains('flex')) {
                    state.globalOverlayJSON = getGlobalOverlayJSON(); 
                }
                const d = {
                    projectName: state.projectName, 
                    originalDataUrl: state.originalDataUrl, 
                    scale: state.scale, 
                    x: state.x, 
                    y: state.y, 
                    excludedFrames: state.excludedFrames, 
                    leadingBlankFrames: state.leadingBlankFrames, 
                    trailingBlankFrames: state.trailingBlankFrames, 
                    framesData: state.framesData, 
                    globalOverlayJSON: state.globalOverlayJSON, 
                    globalGradientConfig: state.globalGradientConfig
                }; 
                const b = new Blob([JSON.stringify(d)], { type: "application/json" }); 
                const a = document.createElement('a'); 
                a.href = URL.createObjectURL(b); 
                a.download = `${state.projectName}_backup.json`; 
                a.click(); 
            }); 
        }

        function openPlayground(btn) { 
            withButtonState(btn, "Caricamento...", async () => { 
                const c = document.getElementById('playground-container'); 
                c.innerHTML = ''; 
                const b = await extractFramesAsBlobs(); 
                b.forEach(x => { 
                    const i = document.createElement('img'); 
                    i.src = URL.createObjectURL(x); 
                    i.className = "snap-item flex-none"; 
                    c.appendChild(i); 
                }); 
                document.getElementById('modal-playground').classList.remove('hidden');
                document.getElementById('modal-playground').classList.add('flex');
            }); 
        }
        
        window.closePlayground = function() { 
            document.getElementById('modal-playground').classList.remove('flex');
            document.getElementById('modal-playground').classList.add('hidden'); 
            const i = document.getElementById('playground-container').getElementsByTagName('img'); 
            for(let x of i) URL.revokeObjectURL(x.src); 
        };
        
        window.closeWithoutSaving = function() { 
            if (fCanvas && fCanvas.getActiveObject() && fCanvas.getActiveObject().isEditing) {
                fCanvas.getActiveObject().exitEditing(); 
            }
            if (fCanvas) fCanvas.discardActiveObject().renderAll(); 
            
            document.getElementById('modal-editor').classList.remove('flex'); 
            document.getElementById('modal-editor').classList.add('hidden'); 
            updateEditorState(); 
        };
        
        window.closeAdvancedEditor = function() { 
            if (fCanvas && fCanvas.getActiveObject() && fCanvas.getActiveObject().isEditing) {
                fCanvas.getActiveObject().exitEditing(); 
            }
            if (fCanvas) { 
                state.globalOverlayJSON = getGlobalOverlayJSON(); 
                fCanvas.discardActiveObject().renderAll(); 
            } 
            document.getElementById('modal-editor').classList.remove('flex'); 
            document.getElementById('modal-editor').classList.add('hidden'); 
            updateEditorState(); 
        };
    </script>
</body>
</html>
