<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Generator Pro - V3 (Studio Unificato HD)</title>
    
    <link rel="icon" href="favicon.ico">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700;1,800&family=Nunito:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            yellow: '#eddc01',
                            blue: '#0146bc',
                            bluedark: '#013896',
                            gray: '#f3f4f6'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                        nunito: ['Nunito', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        input[type=range] { width: 100%; accent-color: #0146bc; cursor: pointer; }
        
        .snap-container { scroll-snap-type: x mandatory; overflow-x: auto; scrollbar-width: none; }
        .snap-container::-webkit-scrollbar { display: none; }
        .snap-item { scroll-snap-align: center; flex-shrink: 0; height: 100% !important; width: auto !important; object-fit: contain; }

        .btn-primary { background-color: #0146bc; color: white; border: 2px solid #0146bc; padding: 0.5rem 1.5rem; text-transform: uppercase; font-weight: 600; font-size: 0.875rem; transition: background-color 0.2s; }
        .btn-primary:hover { background-color: #013896; }
        .btn-secondary { background-color: transparent; color: #0146bc; border: 2px solid #0146bc; padding: 0.5rem 1.5rem; text-transform: uppercase; font-weight: 600; font-size: 0.875rem; transition: background-color 0.2s; }
        .btn-secondary:hover { background-color: #f8fafc; }
        
        .ql-toolbar.ql-snow { border: none !important; border-bottom: 1px solid #e5e7eb !important; padding: 4px !important; }
        .ql-container.ql-snow { border: none !important; font-family: inherit; font-size: 14px; }
        .ql-editor { padding: 8px !important; min-height: 80px; }

        #render-stage { position: absolute; left: -9999px; top: -9999px; z-index: -1; pointer-events: none; }
        #render-text-container { display: inline-block; padding: 4px; white-space: pre-wrap; word-wrap: break-word; overflow-wrap: anywhere; }
        #render-text-content p { margin: 0 !important; padding: 0 !important; line-height: inherit; }

        /* Custom scrollbar per il viewport dell'editor */
        #canvas-viewport::-webkit-scrollbar { width: 12px; height: 12px; }
        #canvas-viewport::-webkit-scrollbar-track { background: #1f2937; }
        #canvas-viewport::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 6px; border: 3px solid #1f2937; }
        #canvas-viewport::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="bg-white text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-brand-blue py-6 px-4 border-b-4 border-brand-yellow">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <h1 class="text-white text-2xl font-bold tracking-wide uppercase">Carousel Generator V3 <span class="text-xs bg-brand-yellow text-brand-blue font-extrabold px-2 py-0.5 ml-2 rounded">Unified HD</span></h1>
        </div>
    </header>

    <main class="flex-grow flex flex-col max-w-6xl mx-auto w-full p-4 md:p-8">
        
        <!-- SEZIONE 1: CONFIGURAZIONE -->
        <section id="section-setup" class="mb-12 max-w-lg border border-gray-200 p-6 bg-brand-gray shadow-sm">
            <h2 class="text-xl font-bold text-brand-blue mb-4 uppercase">1. Configurazione Progetto</h2>
            <div class="flex flex-col gap-4">
                <div>
                    <label class="text-sm font-semibold text-gray-600 block mb-1">Nuovo Progetto (inserisci nome)</label>
                    <input type="text" id="project-name" placeholder="Es. Campagna_Estiva" class="w-full border-2 border-gray-300 p-3 outline-none focus:border-brand-blue transition-colors">
                </div>
                <button id="btn-start" class="btn-primary w-full" onclick="startProject(this)">Inizia Vuoto</button>
                
                <div class="mt-4 border-t border-gray-300 pt-4">
                    <label class="text-sm font-semibold text-gray-600 block mb-2">Hai già un file salvato?</label>
                    <button class="btn-secondary w-full border-gray-400 text-gray-600 hover:text-brand-blue hover:border-brand-blue" onclick="document.getElementById('import-upload').click()">
                        Importa da File JSON
                    </button>
                    <input type="file" id="import-upload" class="hidden" accept=".json" onchange="handleImportJSON(event)">
                </div>
            </div>
        </section>

        <!-- SEZIONE 2: UPLOAD IMMAGINE -->
        <section id="section-upload" class="mb-12 max-w-md hidden">
            <h2 class="text-xl font-bold text-brand-blue mb-4 uppercase">2. Caricamento Asset Base</h2>
            <div class="border-2 border-dashed border-gray-400 bg-brand-gray p-8 text-center cursor-pointer hover:border-brand-blue transition-colors" onclick="document.getElementById('file-upload').click()">
                <svg class="w-12 h-12 mx-auto text-brand-blue mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                <span class="font-semibold text-gray-700 block mt-2">Seleziona immagine orizzontale di sfondo</span>
                <input type="file" id="file-upload" class="hidden" accept="image/png, image/jpeg, image/webp, image/svg+xml" onchange="handleImageUpload(event)">
            </div>
        </section>

        <!-- SEZIONE 3: EDITOR E RITAGLIO -->
        <section id="section-editor" class="hidden flex-col gap-8 w-full">
            <div class="border-b-2 border-gray-200 pb-4 flex justify-between items-end">
                <div>
                    <h2 class="text-xl font-bold text-brand-blue uppercase">3. Progetto: <span id="display-project-name" class="text-gray-600">-</span></h2>
                </div>
                <!-- BANNER STUDIO UNIFICATO -->
                <button type="button" class="btn-primary bg-brand-yellow text-brand-blue border-brand-yellow hover:bg-yellow-400 font-extrabold shadow-md flex items-center gap-2" onclick="openUnifiedStudio(-1)">
                    🎨 APRI STUDIO UNIFICATO
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <!-- CONTROLLI BARRA SINISTRA -->
                <div class="lg:col-span-1 flex flex-col gap-5 bg-brand-gray p-6 border border-gray-200">
                    <h3 class="font-bold text-brand-blue uppercase text-sm border-b border-gray-300 pb-2">Layout Sfondo Base</h3>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1 uppercase tracking-wider">Zoom Sfondo</label>
                        <input type="range" id="slider-scale" step="0.001" value="1" oninput="updateEditorState()">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1 uppercase tracking-wider">Asse X</label>
                            <input type="range" id="slider-x" step="1" value="0" oninput="updateEditorState()">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1 uppercase tracking-wider">Asse Y</label>
                            <input type="range" id="slider-y" step="1" value="0" oninput="updateEditorState()">
                        </div>
                    </div>
                    
                    <div id="exclude-container" class="mt-2 pt-4 border-t border-gray-300">
                        <label class="flex justify-between text-xs font-bold text-gray-700 mb-1 uppercase tracking-wider">
                            <span>Escludi code immagine</span>
                            <span id="exclude-value" class="text-brand-blue font-bold text-base bg-white px-2 py-0.5 border border-gray-300">0</span>
                        </label>
                        <input type="range" id="slider-exclude" min="0" max="0" step="1" value="0" oninput="updateEditorState()">
                    </div>

                    <div class="mt-2 pt-4 border-t border-gray-300 flex flex-col gap-2">
                        <input type="file" id="replace-image-upload" class="hidden" accept="image/png, image/jpeg, image/webp, image/svg+xml" onchange="handleReplaceMainImage(event)">
                        <button class="btn-secondary w-full text-[11px] py-1.5" onclick="document.getElementById('replace-image-upload').click()">Cambia foto sfondo</button>

                        <div class="grid grid-cols-3 gap-1 mt-2">
                            <button class="btn-secondary text-[10px] px-1 py-1" onclick="addBlankFrame('before')">+ Vuoto Inizio</button>
                            <button class="btn-secondary text-[10px] px-1 py-1" onclick="addBlankFrame('inside')">+ Vuoto Mezzo</button>
                            <button class="btn-secondary text-[10px] px-1 py-1" onclick="addBlankFrame('after')">+ Vuoto Fine</button>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-1 mt-1">
                            <button class="text-[10px] uppercase font-bold border border-gray-300 bg-white py-1 hover:bg-gray-100" onclick="removeBlankFrame('before')">- Vuoto Inizio</button>
                            <button class="text-[10px] uppercase font-bold border border-gray-300 bg-white py-1 hover:bg-gray-100" onclick="removeBlankFrame('after')">- Vuoto Fine</button>
                        </div>
                        
                        <p class="text-[10px] text-gray-600 mb-2 text-center">
                            Vuoti: <span id="blank-before-value" class="font-bold">0</span> prima / 
                            <span id="blank-inside-value" class="font-bold">0</span> mezzo / 
                            <span id="blank-after-value" class="font-bold">0</span> dopo
                        </p>
                        
                        <div class="border-t border-gray-300 pt-3 mt-1 flex flex-col gap-2">
                            <input type="file" id="import-module-upload" class="hidden" accept=".json" onchange="handleImportModuleJSON(event)">
                            <button class="btn-secondary w-full text-[10px] py-1.5 bg-blue-50" onclick="document.getElementById('import-module-upload').click()">⬇️ Appendi JSON Modulo</button>
                            
                            <input type="file" id="append-image-upload" class="hidden" accept="image/png, image/jpeg, image/webp" onchange="handleAppendImage(event)">
                            <button class="btn-secondary w-full text-[10px] py-1.5 bg-gray-50 text-gray-700 border-gray-400 hover:border-brand-blue" onclick="document.getElementById('append-image-upload').click()">➕ Appendi Immagine Piatta</button>
                        </div>
                    </div>
                    
                    <div class="mt-6 pt-5 border-t-2 border-gray-300 flex flex-col gap-2">
                        <button id="btn-undo-main" data-undo-button class="btn-secondary w-full text-[11px] py-1.5 opacity-50 cursor-not-allowed" disabled onclick="undoLastOperation()">Annulla azione</button>
                        <button class="btn-secondary w-full text-[11px] py-2" onclick="openPlayground(this)">Testa Swipe (Playground)</button>
                        <!-- NUOVO PULSANTE ESPORTAZIONE PANORAMICA -->
                        <button class="btn-secondary w-full text-[11px] py-2 font-bold" onclick="exportFullEditedImage(this)">Scarica Panorama Intero (PNG)</button>
                        <div class="grid grid-cols-3 gap-2 mt-2">
                            <button class="btn-primary text-[10px] px-1 py-2 col-span-1" onclick="exportProjectJSON(this)">Salva JSON</button>
                            <button class="btn-primary bg-green-600 border-green-600 hover:bg-green-700 text-[10px] px-1 py-2 col-span-2" onclick="exportCarousel(this)">Esporta ZIP Finale</button>
                        </div>
                    </div>
                </div>

                <!-- GRIGLIA ANTEPRIMA -->
                <div class="lg:col-span-3 overflow-x-auto bg-gray-100 border border-gray-300 pb-4 relative h-[350px] md:h-[500px]">
                    <div id="crop-area" class="relative h-full overflow-hidden origin-top-left flex">
                        <div id="grid-container" class="absolute inset-0 flex pointer-events-none"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- MODALE STUDIO UNIFICATO -->
    <div id="modal-editor" class="fixed inset-0 z-50 bg-gray-900/95 hidden flex-col justify-start items-stretch">
        
        <!-- TOOLBAR SUPERIORE PAN & ZOOM -->
        <div class="w-full bg-gray-800 text-white px-6 py-3 flex flex-wrap items-center justify-between gap-4 border-b-2 border-brand-yellow shadow-xl flex-shrink-0 z-50">
            <div class="flex items-center gap-3">
                <span class="text-xs font-extrabold uppercase tracking-wider text-brand-yellow flex items-center gap-1.5">
                    <span>🔍 Zoom:</span>
                </span>
                <div class="flex items-center bg-gray-900 rounded border border-gray-600 overflow-hidden shadow-inner">
                    <button type="button" class="px-3 py-1 hover:bg-gray-700 font-extrabold text-sm transition-colors" onclick="changeEditorZoom(-0.15)">-</button>
                    <span id="zoom-display-val" class="px-3 py-1 font-mono text-xs font-bold text-brand-yellow min-w-[60px] text-center border-l border-r border-gray-700">100%</span>
                    <button type="button" class="px-3 py-1 hover:bg-gray-700 font-extrabold text-sm transition-colors" onclick="changeEditorZoom(0.15)">+</button>
                </div>
                <button type="button" class="text-xs bg-gray-700 hover:bg-brand-blue text-white font-bold px-3 py-1 rounded border border-gray-500 transition-colors shadow" onclick="fitZoomToSlide()">Adatta Slide</button>
                <button type="button" class="text-xs bg-gray-700 hover:bg-brand-blue text-white font-bold px-3 py-1 rounded border border-gray-500 transition-colors shadow" onclick="fitZoomToAll()">Visione Globale</button>
            </div>

            <!-- JUMPERS RAPIDI PER SLIDE -->
            <div class="flex items-center gap-1.5 overflow-x-auto max-w-full py-0.5">
                <span class="text-xs font-extrabold uppercase text-gray-300 mr-1">📍 Vai alla Slide:</span>
                <div id="toolbar-slide-jumpers" class="flex items-center gap-1"></div>
            </div>

            <!-- AZIONI MODALE -->
            <div class="flex items-center gap-3">
                <!-- NUOVO PULSANTE ESPORTAZIONE PANORAMICA DENTRO L'EDITOR -->
                <button class="bg-green-600 text-white hover:bg-green-500 border border-green-700 font-bold text-xs px-4 py-1.5 uppercase transition-colors rounded shadow flex items-center gap-1" onclick="exportFullEditedImage(this)">
                    ⬇️ Panorama Intero
                </button>
                <button id="btn-undo-editor" data-undo-button class="bg-gray-700 text-white hover:bg-gray-600 border border-gray-500 font-bold text-xs px-3 py-1.5 uppercase transition-colors rounded opacity-50 cursor-not-allowed" disabled onclick="undoLastOperation()">Annulla</button>
                <button class="bg-gray-100 text-red-600 hover:bg-white border border-gray-300 font-bold text-xs px-4 py-1.5 uppercase transition-colors rounded shadow" onclick="closeWithoutSaving()">Chiudi senza salvare</button>
                <button class="bg-brand-yellow text-brand-blue hover:bg-white font-extrabold text-xs px-6 py-1.5 uppercase transition-colors rounded shadow-lg" onclick="closeAdvancedEditor()">Salva e Torna al Menu</button>
            </div>
        </div>
        
        <!-- AREA LAVORO PRINCIPALE -->
        <div class="flex-1 w-full flex flex-col md:flex-row overflow-hidden relative">
            
            <!-- SIDEBAR CONTROLLI -->
            <div class="w-full md:w-[320px] bg-gray-50 border-r border-gray-300 p-4 flex flex-col gap-4 overflow-y-auto z-40 flex-shrink-0" id="sidebar-container">
                <!-- Verrà popolata dinamicamente con enhanceEditorSidebar -->
            </div>

            <!-- VIEWPORT SCORREVOLE DEL CANVAS -->
            <div id="canvas-viewport" class="flex-1 w-full h-full overflow-auto p-12 bg-gray-300 flex items-start justify-start relative">
                <div class="shadow-2xl border border-gray-400 bg-white relative my-auto mx-auto transition-none" id="canvas-wrapper">
                    <canvas id="fabric-canvas"></canvas>
                </div>
            </div>

        </div>
    </div>

    <!-- RENDER STAGE PER I TESTI CON HTML2CANVAS (Nascosto) -->
    <div id="render-stage">
        <div id="render-text-container">
            <div id="render-text-content"></div>
        </div>
    </div>

    <!-- MODALE PLAYGROUND INSTAGRAM -->
    <div id="modal-playground" class="fixed inset-0 z-50 bg-gray-900/95 hidden flex-col justify-center items-center p-4">
        <div class="absolute top-6 right-6">
            <button class="text-white hover:text-brand-yellow font-bold text-lg uppercase tracking-widest" onclick="closePlayground()">Chiudi X</button>
        </div>
        <p class="text-brand-yellow mb-6 text-sm uppercase tracking-widest font-bold bg-brand-blue px-4 py-1">Simulatore Swipe Instagram (4:5)</p>
        <div class="w-full max-w-[360px] aspect-[4/5] bg-black border-[12px] border-gray-800 rounded-[24px] shadow-2xl overflow-hidden relative">
            <div id="playground-container" class="snap-container flex w-full h-full bg-black"></div>
        </div>
    </div>

    <!-- CORE SCRIPTS -->
    <script>
        /* ==========================================================================
           1. INIZIALIZZAZIONE E PATCH FABRIC.JS
           ========================================================================== */
        if (!fabric.Rect.prototype._decorBoxRenderPatched) {
            fabric.Rect.prototype._decorBoxOriginalRender = fabric.Rect.prototype._render;
            fabric.Rect.prototype._render = function(ctx) {
                fabric.Rect.prototype._decorBoxOriginalRender.call(this, ctx);
                if (!this.isDecorBox) return;
                var w = this.width || 0; var h = this.height || 0; var x = -w / 2; var y = -h / 2;
                var barW = Math.max(1, parseFloat(this.customBoxBarWidth) || 8);
                ctx.save(); 
                ctx.fillStyle = this.customBoxBarColor || '#eddc01';
                if (this.customBoxBarLeft) ctx.fillRect(x, y, Math.min(barW, w), h);
                if (this.customBoxBarRight) ctx.fillRect(x + w - Math.min(barW, w), y, Math.min(barW, w), h);
                if (this.customBoxBarTop) ctx.fillRect(x, y, w, Math.min(barW, h));
                if (this.customBoxBarBottom) ctx.fillRect(x, y + h - Math.min(barW, h), w, Math.min(barW, h));
                ctx.restore();
            };
            fabric.Rect.prototype._decorBoxRenderPatched = true;
        }

        var state = {
            projectName: '', imgObj: null, originalDataUrl: null, baseScale: 1, scale: 1, x: 0, y: 0,
            maxPossibleFrames: 1, imageFramesCount: 1, leadingBlankFrames: 0, trailingBlankFrames: 0,
            excludedFrames: 0, finalFramesCount: 1, isRestoring: false,
            viewportHeight: window.innerWidth < 768 ? 350 : 500, framesData: [],
            globalOverlayJSON: null,
            globalGradientConfig: { enabled: false, direction: 'bottom', size: 45, color: '#000000', opacity: 65, activeSlides: [] },
            editorZoom: 1.0,
            get frameWidth() { return this.viewportHeight * (4/5); }
        };

        var fCanvas = null;
        var quill = null;
        var previewTimeout = null;
        var textApplyRevision = 0;
        var textAutoApplyTimer = null;
        var undoStack = [];
        var undoRestoring = false;
        var undoLimit = 30;
        var fabricUndoHookInstalled = false;

        var CUSTOM_FABRIC_PROPS = [
            'isDecorBox', 'isDecorCircle', 'customBoxBarLeft', 'customBoxBarRight', 'customBoxBarTop', 'customBoxBarBottom',
            'customBoxBarColor', 'customBoxBarWidth', 'isGradientLayer', 'targetSlideIndex',
            'isCustomTextAsset', 'sourceHTML', 'globalSettings'
        ];

        const TEXT_RENDER_SCALE = 3;
        const TEXT_OBJECT_SCALE = 1 / TEXT_RENDER_SCALE;

        window.addEventListener('resize', () => { 
            state.viewportHeight = window.innerWidth < 768 ? 350 : 500; 
            if(state.imgObj) { restoreEditorUI(); } 
        });

        /* ==========================================================================
           2. SISTEMA DI UNDO / REDO UNIFICATO E JSON SEAMLESS
           ========================================================================== */
        function cloneForUndo(value) { return JSON.parse(JSON.stringify(value)); }
        
        // ESTRAZIONE JSON PULITA CHE NON CORROMPE LE COORDINATE E IL VIEWPORT!
        function getGlobalOverlayJSON() {
            if (!fCanvas) return state.globalOverlayJSON;
            
            // Salva lo stato dello scorrimento attuale per evitare che la finestra "salti"
            const vp = document.getElementById('canvas-viewport');
            const savedScrollLeft = vp ? vp.scrollLeft : 0;
            const savedScrollTop = vp ? vp.scrollTop : 0;

            // Ripristina lo zoom a 1x in background per la corretta serializzazione
            const curZoom = fCanvas.getZoom() || 1;
            const baseW = state.finalFramesCount * state.frameWidth;
            const baseH = state.viewportHeight;

            fCanvas.setZoom(1);
            fCanvas.setWidth(baseW);
            fCanvas.setHeight(baseH);

            const json = fCanvas.toJSON(CUSTOM_FABRIC_PROPS);

            // Re-applica lo zoom dell'utente in modo invisibile
            fCanvas.setZoom(curZoom);
            fCanvas.setWidth(baseW * curZoom);
            fCanvas.setHeight(baseH * curZoom);

            // Ripristina forzatamente lo scorrimento
            if (vp) {
                vp.scrollLeft = savedScrollLeft;
                vp.scrollTop = savedScrollTop;
            }

            json.backgroundImage = undefined; 
            json.overlayImage = undefined;
            if (json.objects) {
                // Rimuoviamo i layer delle sfumature così vengono rigenerati ad-hoc
                json.objects = json.objects.filter(obj => !obj.isGradientLayer);
            }
            return json;
        }

        async function getUnifiedOverlayCanvas(targetTotalW, targetH) {
            if (!state.globalOverlayJSON || !state.globalOverlayJSON.objects || !state.globalOverlayJSON.objects.length) return null;
            const layer = new fabric.StaticCanvas(null, { width: state.finalFramesCount * state.frameWidth, height: state.viewportHeight });
            
            await new Promise(resolve => { 
                layer.loadFromJSON(state.globalOverlayJSON, () => { 
                    layer.setBackgroundImage(null, () => {}); 
                    layer.renderAll(); 
                    resolve(); 
                }, function(o, object) {
                    // Reviver per recuperare le proprietà custom bloccate da fabric
                    CUSTOM_FABRIC_PROPS.forEach(prop => { if (o[prop] !== undefined) object[prop] = o[prop]; });
                }); 
            });
            
            // Esportazione ultra hd per le grafiche e i testi vettoriali
            const multiplier = targetH / state.viewportHeight;
            const dataUrl = layer.toDataURL({ format: 'png', multiplier: multiplier });
            const img = await new Promise(r => { const i = new Image(); i.onload = () => r(i); i.src = dataUrl; });

            const outCanvas = document.createElement('canvas'); 
            outCanvas.width = targetTotalW; 
            outCanvas.height = targetH; 
            outCanvas.getContext('2d').drawImage(img, 0, 0); 
            layer.dispose(); 
            return outCanvas;
        }

        function getUndoSnapshot() {
            if (fCanvas && document.getElementById('modal-editor').classList.contains('flex')) {
                state.globalOverlayJSON = getGlobalOverlayJSON();
            }
            return {
                projectName: state.projectName, 
                originalDataUrl: state.originalDataUrl, 
                baseScale: state.baseScale,
                scale: state.scale, 
                x: state.x, 
                y: state.y, 
                maxPossibleFrames: state.maxPossibleFrames,
                imageFramesCount: state.imageFramesCount, 
                leadingBlankFrames: state.leadingBlankFrames || 0,
                trailingBlankFrames: state.trailingBlankFrames || 0, 
                excludedFrames: state.excludedFrames || 0,
                finalFramesCount: state.finalFramesCount || 1, 
                framesData: cloneForUndo(state.framesData || []),
                globalOverlayJSON: state.globalOverlayJSON ? cloneForUndo(state.globalOverlayJSON) : null,
                globalGradientConfig: state.globalGradientConfig ? cloneForUndo(state.globalGradientConfig) : null
            };
        }

        function updateUndoButtons() {
            document.querySelectorAll('[data-undo-button]').forEach(button => {
                button.disabled = undoStack.length === 0;
                button.classList.toggle('opacity-50', undoStack.length === 0);
                button.classList.toggle('cursor-not-allowed', undoStack.length === 0);
            });
        }

        function saveUndoSnapshot() {
            if (undoRestoring || !state.originalDataUrl) return;
            const snapshot = getUndoSnapshot(); 
            const snapshotKey = JSON.stringify(snapshot);
            const last = undoStack[undoStack.length - 1];
            if (last && last._key === snapshotKey) return;
            
            snapshot._key = snapshotKey; 
            undoStack.push(snapshot);
            if (undoStack.length > undoLimit) undoStack.shift();
            updateUndoButtons();
        }

        function restoreImageForUndo(dataUrl) {
            return new Promise(resolve => {
                if (!dataUrl) { 
                    state.imgObj = null; 
                    resolve(); 
                    return; 
                }
                const img = new Image(); 
                img.onload = () => { state.imgObj = img; resolve(); }; 
                img.src = dataUrl;
            });
        }

        window.undoLastOperation = async function() {
            if (!undoStack.length) return;
            const snapshot = undoStack.pop(); 
            undoRestoring = true;
            
            await restoreImageForUndo(snapshot.originalDataUrl);
            
            state.projectName = snapshot.projectName; 
            state.originalDataUrl = snapshot.originalDataUrl;
            state.baseScale = snapshot.baseScale; 
            state.scale = snapshot.scale; 
            state.x = snapshot.x; 
            state.y = snapshot.y;
            state.maxPossibleFrames = snapshot.maxPossibleFrames; 
            state.imageFramesCount = snapshot.imageFramesCount;
            state.leadingBlankFrames = snapshot.leadingBlankFrames || 0; 
            state.trailingBlankFrames = snapshot.trailingBlankFrames || 0;
            state.excludedFrames = snapshot.excludedFrames || 0; 
            state.finalFramesCount = snapshot.finalFramesCount || 1;
            state.framesData = cloneForUndo(snapshot.framesData || []); 
            state.globalOverlayJSON = snapshot.globalOverlayJSON ? cloneForUndo(snapshot.globalOverlayJSON) : null;
            state.globalGradientConfig = snapshot.globalGradientConfig ? cloneForUndo(snapshot.globalGradientConfig) : { enabled: false, direction: 'bottom', size: 45, color: '#000000', opacity: 65, activeSlides: [] };
            state.isRestoring = true;

            const projectLabel = document.getElementById('display-project-name'); 
            if (projectLabel) projectLabel.innerText = state.projectName;
            if (state.imgObj) restoreEditorUI();
            
            const editorModal = document.getElementById('modal-editor');
            if (editorModal && !editorModal.classList.contains('hidden')) {
                if (fCanvas) {
                    fCanvas.clear();
                    if (state.globalOverlayJSON) {
                        const safeJson = cloneForUndo(state.globalOverlayJSON);
                        fCanvas.loadFromJSON(safeJson, () => { 
                            syncSelectiveGradientsToCanvas(); 
                            fCanvas.requestRenderAll(); 
                        });
                    } else { 
                        syncSelectiveGradientsToCanvas(); 
                        fCanvas.requestRenderAll(); 
                    }
                }
            }
            undoRestoring = false; 
            updateUndoButtons(); 
            syncUnifiedThumbnails();
        };

        function shouldTrackUndoTarget(target) {
            const el = target.closest('button, input, select, textarea, [contenteditable="true"], canvas');
            if (!el || el.dataset.undoButton !== undefined) return false;
            
            const action = [el.getAttribute('onclick') || '', el.getAttribute('oninput') || '', el.getAttribute('onchange') || ''].join(' ');
            if (/exportCarousel|exportProjectJSON|exportFullEditedImage|openPlayground|closePlayground|closeAdvancedEditor|closeWithoutSaving|changeEditorZoom|fitZoomToSlide|fitZoomToAll/.test(action)) return false;
            
            return /addBlankFrame|removeBlankFrame|handleReplaceMainImage|addPreset|addDecorBox|addDecorCircle|handleOverlayImageImport|duplicateSelectedObject|copySelectedObjectToNextSlide|bringSelectedForward|sendSelectedBackward|alignObject|alignMultiple|deleteSelectedObject|applyTextToCanvas|applyQuickColor|toggleSlideGradient|selectAllGradientSlides|updateSelectiveGradient/.test(action) || el.id === 'fabric-canvas' || el.isContentEditable;
        }

        document.addEventListener('pointerdown', event => { if (shouldTrackUndoTarget(event.target)) saveUndoSnapshot(); }, true);
        document.addEventListener('change', event => { if (shouldTrackUndoTarget(event.target)) saveUndoSnapshot(); }, true);
        document.addEventListener('keydown', event => {
            if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'z') { 
                event.preventDefault(); 
                undoLastOperation(); 
                return; 
            }
            if (shouldTrackUndoTarget(event.target)) saveUndoSnapshot();
        }, true);

            btn.innerHTML = activeText;

        }

        function handleImageUpload(event) {
            const file = event.target.files[0]; 
            if (!file) return;

                state.originalDataUrl = e.target.result;

        function handleReplaceMainImage(event) {
            const file = event.target.files[0]; 
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => { 
                state.originalDataUrl = e.target.result; 
                const img = new Image(); 
                img.onload = () => { 
                    state.imgObj = img; 
                    state.baseScale = state.viewportHeight / state.imgObj.naturalHeight;

        }

        function isBlankFrameData(frameData) { return !!(frameData && frameData.isBlankFrame); }
        function getBlankFramesCount() { if (!Array.isArray(state.framesData)) return 0; return state.framesData.filter(isBlankFrameData).length; }
        function getInternalBlankFramesCount() {
            if (!Array.isArray(state.framesData)) return 0;
            const before = state.leadingBlankFrames || 0; const after = state.trailingBlankFrames || 0;
            return state.framesData.filter((frame, index) => { return isBlankFrameData(frame) && index >= before && index < state.framesData.length - after; }).length;
        }

        function ensureFramesData() { if (!Array.isArray(state.framesData)) state.framesData = []; }
        
        function addBlankFrame(position) {
            ensureFramesData();
            if (position === 'before') { 
                state.leadingBlankFrames = (state.leadingBlankFrames || 0) + 1; 
                state.framesData.unshift({ isBlankFrame: true }); 
            } else if (position === 'inside') {
                const total = state.finalFramesCount || state.framesData.length || 0; 
                const maxAfterFrame = Math.max(1, total - 1);
                const answer = prompt(`Inserisci il frame vuoto dopo quale frame? Inserisci un numero da 1 a ${maxAfterFrame}.`, String(maxAfterFrame));
                if (answer === null) return;
                const afterFrameNumber = Math.min(maxAfterFrame, Math.max(1, parseInt(answer, 10) || 1));
                state.framesData.splice(afterFrameNumber, 0, { isBlankFrame: true });
            } else { 
                state.trailingBlankFrames = (state.trailingBlankFrames || 0) + 1; 
                state.framesData.push({ isBlankFrame: true }); 
            }
            updateEditorState();
        }

        function removeBlankFrame(position) {
            ensureFramesData();
            if (position === 'before' && state.leadingBlankFrames > 0 && isBlankFrameData(state.framesData[0])) { 
                state.leadingBlankFrames--; 
                state.framesData.shift(); 
            }
            if (position === 'after' && state.trailingBlankFrames > 0 && isBlankFrameData(state.framesData[state.framesData.length - 1])) { 
                state.trailingBlankFrames--; 
                state.framesData.pop(); 
            }
            updateEditorState();
        }

        function getFrameInfo(frameIndex) {
            ensureFramesData();
            if (isBlankFrameData(state.framesData[frameIndex])) return { type: 'blank' };
            const imageCount = state.imageFramesCount || Math.max(1, state.maxPossibleFrames - state.excludedFrames);
            let imageIndex = 0;
            for (let i = 0; i <= frameIndex; i++) { 
                if (isBlankFrameData(state.framesData[i])) continue; 
                if (i === frameIndex) break; 
                imageIndex++; 
            }
            if (imageIndex >= imageCount) return { type: 'blank' };
            return { type: 'image', imageIndex };
        }

        function handleImportJSON(event) {
            const file = event.target.files[0]; 
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    state.projectName = data.projectName; 
                    state.originalDataUrl = data.originalDataUrl; 
                    state.scale = data.scale; 
                    state.x = data.x; 
                    state.y = data.y; 
                    state.excludedFrames = data.excludedFrames || 0; 
                    state.leadingBlankFrames = data.leadingBlankFrames || 0; 
                    state.trailingBlankFrames = data.trailingBlankFrames || 0; 
                    state.framesData = data.framesData || []; 
                    state.globalOverlayJSON = data.globalOverlayJSON || null;
                    if (data.globalGradientConfig) state.globalGradientConfig = data.globalGradientConfig;
                    
                    state.isRestoring = true;
                    const img = new Image(); 
                    img.onload = () => { state.imgObj = img; restoreEditorUI(); }; 
                    img.src = state.originalDataUrl;
                } catch(err) { 
                    alert("Errore file JSON: " + err.message); 
                }
            };
            reader.readAsText(file);
        }

        window.handleImportModuleJSON = function(event) {
            const file = event.target.files[0]; 
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result); 
                    let framesToAdd = []; 
                    let originalImage = null;
                    if (data.framesData && Array.isArray(data.framesData)) { framesToAdd = data.framesData; } 
                    else if (data.objects) { framesToAdd = [{ fabricJSON: data }]; }
                    
                    if (framesToAdd.length === 0) return alert("Nessun contenuto valido trovato nel JSON.");
                    if (data.originalDataUrl) { 
                        originalImage = await new Promise(res => { 
                            const img = new Image(); 
                            img.onload = () => res(img); 
                            img.onerror = () => res(null); 
                            img.src = data.originalDataUrl; 
                        }); 
                    }

                    saveUndoSnapshot(); 
                    ensureFramesData();
                    
                    let origImageFramesCount = data.imageFramesCount || Math.max(1, (data.maxPossibleFrames || 1) - (data.excludedFrames || 0));
                    let origImageIndex = 0; 
                    const currentTotalFrames = state.finalFramesCount;

                    for (let i = 0; i < framesToAdd.length; i++) {
                        let f = framesToAdd[i]; 
                        let isOrigBlank = f.isBlankFrame; 
                        let newFabricJSON = f.fabricJSON ? JSON.parse(JSON.stringify(f.fabricJSON)) : { version: fabric.version || "5.3.0", objects: [] };
                        if (!newFabricJSON.objects) newFabricJSON.objects = [];

                        if (!isOrigBlank && originalImage && origImageIndex < origImageFramesCount) {
                            const imgX = (data.x || 0) - (origImageIndex * state.frameWidth);
                            const bgObj = { 
                                type: 'image', originX: 'left', originY: 'top', left: imgX, top: data.y || 0, 
                                width: originalImage.naturalWidth || originalImage.width, height: originalImage.naturalHeight || originalImage.height, 
                                scaleX: data.scale || 1, scaleY: data.scale || 1, src: data.originalDataUrl, 
                                lockUniScaling: true, lockScalingFlip: true, objectCaching: false, selectable: false, evented: false, hasControls: false 
                            };
                            newFabricJSON.objects.unshift(bgObj); 
                            origImageIndex++;
                        }

                        if (newFabricJSON.objects.length > 0) {
                            state.globalOverlayJSON = state.globalOverlayJSON || { version: fabric.version || "5.3.0", objects: [] };
                            const targetOffsetX = (currentTotalFrames + i) * state.frameWidth;
                            newFabricJSON.objects.forEach(obj => { 
                                if (obj.isGradientLayer) return; 
                                obj.left = (obj.left || 0) + targetOffsetX; 
                                state.globalOverlayJSON.objects.push(obj); 
                            });
                        }
                        state.trailingBlankFrames = (state.trailingBlankFrames || 0) + 1; 
                        state.framesData.push({ isBlankFrame: true });
                    }
                    updateEditorState();
                } catch(err) { 
                    alert("Errore lettura modulo JSON: " + err.message); 
                }
                event.target.value = ''; 
            };
            reader.readAsText(file);
        };

        window.handleAppendImage = function(event) {
            const file = event.target.files[0]; 
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const img = await new Promise(res => { 
                    const i = new Image(); 
                    i.onload = () => res(i); 
                    i.onerror = () => res(null); 
                    i.src = e.target.result; 
                });
                if (!img) return;
                
                saveUndoSnapshot(); 
                ensureFramesData();
                
                const scale = state.viewportHeight / img.naturalHeight;
                const framesAdd = Math.max(1, Math.floor((img.naturalWidth * scale) / state.frameWidth));
                const startFrames = state.finalFramesCount;
                
                state.globalOverlayJSON = state.globalOverlayJSON || { version: "5.3.0", objects: [] };
                state.globalOverlayJSON.objects.unshift({ 
                    type: 'image', originX: 'left', originY: 'top', 
                    left: startFrames * state.frameWidth, top: 0, 
                    width: img.naturalWidth, height: img.naturalHeight, 
                    scaleX: scale, scaleY: scale, 
                    src: e.target.result, selectable: false, evented: false 
                });
                
                for(let i=0; i<framesAdd; i++) { 
                    state.trailingBlankFrames = (state.trailingBlankFrames || 0) + 1; 
                    state.framesData.push({ isBlankFrame: true }); 
                }
                updateEditorState();
            };
            reader.readAsDataURL(file); 
            event.target.value = '';
        };

        function initEditor() {
            document.getElementById('section-upload').classList.add('hidden'); 
            document.getElementById('section-editor').classList.remove('hidden'); 
            document.getElementById('section-editor').classList.add('flex');
            
            state.baseScale = state.viewportHeight / state.imgObj.naturalHeight; 
            state.scale = state.baseScale; 
            state.x = 0; 
            state.y = 0; 
            state.excludedFrames = 0; 
            
            const sc = document.getElementById('slider-scale'); 
            sc.min = state.baseScale; 
            sc.max = Math.max(1.5, state.baseScale * 5); 
            sc.value = state.baseScale;
            
            document.getElementById('slider-exclude').value = 0; 
            updateEditorState();
        }

        function restoreEditorUI() {
            document.getElementById('section-setup').classList.add('hidden'); 
            document.getElementById('section-upload').classList.add('hidden'); 
            document.getElementById('section-editor').classList.remove('hidden'); 
            document.getElementById('section-editor').classList.add('flex');
            document.getElementById('display-project-name').innerText = state.projectName; 
            
            state.baseScale = state.viewportHeight / state.imgObj.naturalHeight; 
            
            const sc = document.getElementById('slider-scale'); 
            sc.min = state.baseScale; 
            sc.max = Math.max(1.5, state.baseScale * 5); 
            sc.value = state.scale;
            
            document.getElementById('slider-exclude').value = state.excludedFrames; 
            updateEditorState();
        }

        function updateEditorState() {
            if (!state.imgObj) return;
            state.scale = parseFloat(document.getElementById('slider-scale').value);
            const scaledW = state.imgObj.naturalWidth * state.scale; 
            const scaledH = state.imgObj.naturalHeight * state.scale;
            
            let maxFrames = Math.ceil(scaledW / state.frameWidth); 
            if (maxFrames < 1) maxFrames = 1;
            state.maxPossibleFrames = maxFrames;

            const excludeSlider = document.getElementById('slider-exclude');
            if (maxFrames >= 2) { 
                excludeSlider.disabled = false; 
                excludeSlider.max = maxFrames - 1; 
                if (parseInt(excludeSlider.value) > maxFrames - 1) excludeSlider.value = maxFrames - 1; 
            } else { 
                excludeSlider.max = 0; 
                excludeSlider.value = 0; 
                excludeSlider.disabled = true; 
            }
            state.excludedFrames = parseInt(excludeSlider.value) || 0;
            document.getElementById('exclude-value').innerText = state.excludedFrames;

            state.imageFramesCount = state.maxPossibleFrames - state.excludedFrames;
            state.finalFramesCount = state.imageFramesCount + getBlankFramesCount();
            const totalActiveWidth = state.finalFramesCount * state.frameWidth;

            if (!state.framesData || state.framesData.length !== state.finalFramesCount) { 
                state.framesData = Array.from({length: state.finalFramesCount}, (_, i) => state.framesData[i] || {}); 
            }

            document.getElementById('blank-before-value').innerText = state.leadingBlankFrames || 0;
            document.getElementById('blank-after-value').innerText = state.trailingBlankFrames || 0;
            const blankInsideValue = document.getElementById('blank-inside-value');
            if (blankInsideValue) blankInsideValue.innerText = getInternalBlankFramesCount();

            let minX = (state.imageFramesCount * state.frameWidth) - scaledW; 
            if (minX > 0) minX = 0;
            const sliderX = document.getElementById('slider-x'); 
            sliderX.min = minX; 
            sliderX.max = 0;
            
            let minY = state.viewportHeight - scaledH; 
            if (minY > 0) minY = 0;
            const sliderY = document.getElementById('slider-y'); 
            sliderY.min = minY; 
            sliderY.max = 0;

            if (state.isRestoring) { 
                sliderX.value = state.x; 
                sliderY.value = state.y; 
                state.isRestoring = false; 
            }
            state.x = Math.max(minX, Math.min(0, parseFloat(sliderX.value) || 0)); 
            state.y = Math.max(minY, Math.min(0, parseFloat(sliderY.value) || 0));
            sliderX.value = state.x; 
            sliderY.value = state.y;

            document.getElementById('crop-area').style.width = `${totalActiveWidth}px`;
            const gridContainer = document.getElementById('grid-container'); 
            gridContainer.innerHTML = ''; 

            for(let i = 0; i < state.finalFramesCount; i++) {
                const frame = document.createElement('div'); 
                const frameInfo = getFrameInfo(i);
                
                frame.style.width = `${state.frameWidth}px`; 
                frame.style.height = `${state.viewportHeight}px`;
                let borderClass = 'border-2 border-brand-yellow'; 
                if (i > 0) borderClass += ' border-l-2 border-dashed border-l-brand-yellow/70';
                
                const frameBgClass = frameInfo.type === 'blank' ? 'bg-white' : 'bg-black/5';
                frame.className = `${borderClass} flex items-center justify-center ${frameBgClass} flex-shrink-0 relative group pointer-events-auto cursor-default overflow-hidden`;
                
                if (frameInfo.type === 'image' && state.imgObj) {
                    const bgContainer = document.createElement('div'); 
                    bgContainer.className = 'absolute inset-0 overflow-hidden z-0 pointer-events-none';
                    const bgImg = document.createElement('img'); 
                    bgImg.src = state.imgObj.src; 
                    bgImg.className = 'absolute max-w-none origin-top-left pointer-events-none';
                    bgImg.style.transform = `translate(${state.x - (frameInfo.imageIndex * state.frameWidth)}px, ${state.y}px) scale(${state.scale})`;
                    bgContainer.appendChild(bgImg); 
                    frame.appendChild(bgContainer);
                }

                const thumbImg = document.createElement('img'); 
                thumbImg.id = `thumb-img-${i}`; 
                thumbImg.className = 'absolute inset-0 w-full h-full pointer-events-none z-10 object-contain';
                
                const label = document.createElement('span'); 
                label.className = 'absolute bottom-3 left-3 bg-brand-yellow text-brand-blue font-bold text-lg px-3 py-1 z-20 pointer-events-none shadow-md'; 
                label.innerText = i + 1;
                
                const editBtn = document.createElement('button');
                editBtn.className = 'absolute bottom-3 right-3 bg-brand-blue text-white py-1.5 px-3 opacity-0 group-hover:opacity-100 transition-opacity duration-200 z-30 cursor-pointer shadow-md hover:bg-brand-bluedark flex items-center gap-2 text-[10px] font-bold uppercase tracking-wider border border-white/20';
                editBtn.innerHTML = `MODIFICA SLIDE ${i+1}`; 
                editBtn.onclick = () => openUnifiedStudio(i);
                
                frame.appendChild(thumbImg); 
                frame.appendChild(label); 
                frame.appendChild(editBtn); 
                gridContainer.appendChild(frame);
            }
            setTimeout(syncUnifiedThumbnails, 60);
        }

        // Funzione per disegnare le sfumature offline per export e anteprime
        function drawSlideGradient(ctx, slideIdx, targetW, targetH) {
            const cfg = state.globalGradientConfig;
            if (!cfg || !cfg.enabled || !cfg.activeSlides || !cfg.activeSlides.includes(slideIdx)) return;
            
            const alpha = Math.max(0, Math.min(100, parseFloat(cfg.opacity) || 0)) / 100;
            const sizePct = Math.max(1, Math.min(100, parseFloat(cfg.size) || 45));
            const c = (cfg.color || '#000000').replace('#', '');
            const n = c.length === 3 ? c.split('').map(x=>x+x).join('') : c.padEnd(6,'0');
            const r = parseInt(n.slice(0,2), 16) || 0; 
            const g = parseInt(n.slice(2,4), 16) || 0; 
            const b = parseInt(n.slice(4,6), 16) || 0;
            const solid = `rgba(${r},${g},${b},${alpha})`; 
            const clear = `rgba(${r},${g},${b},0)`;
            
            let grad;
            if (cfg.direction === 'full') { 
                ctx.fillStyle = solid; 
                ctx.fillRect(0, 0, targetW, targetH); 
            } else if (cfg.direction === 'bottom') { 
                const h = targetH * (sizePct / 100); 
                grad = ctx.createLinearGradient(0, targetH - h, 0, targetH); 
                grad.addColorStop(0, clear); 
                grad.addColorStop(1, solid); 
                ctx.fillStyle = grad; 
                ctx.fillRect(0, targetH - h, targetW, h); 
            } else if (cfg.direction === 'top') { 
                const h = targetH * (sizePct / 100); 
                grad = ctx.createLinearGradient(0, 0, 0, h); 
                grad.addColorStop(0, solid); 
                grad.addColorStop(1, clear); 
                ctx.fillStyle = grad; 
                ctx.fillRect(0, 0, targetW, h); 
            } else if (cfg.direction === 'left') { 
                const w = targetW * (sizePct / 100); 
                grad = ctx.createLinearGradient(0, 0, w, 0); 
                grad.addColorStop(0, solid); 
                grad.addColorStop(1, clear); 
                ctx.fillStyle = grad; 
                ctx.fillRect(0, 0, w, targetH); 
            } else if (cfg.direction === 'right') { 
                const w = targetW * (sizePct / 100); 
                grad = ctx.createLinearGradient(targetW - w, 0, targetW, 0); 
                grad.addColorStop(0, clear); 
                grad.addColorStop(1, solid); 
                ctx.fillStyle = grad; 
                ctx.fillRect(targetW - w, 0, w, targetH); 
            }
        }

        async function syncUnifiedThumbnails() {
            const overlayCanvas = await getUnifiedOverlayCanvas(state.finalFramesCount * state.frameWidth, state.viewportHeight);
            for (let i = 0; i < state.finalFramesCount; i++) {
                const thumbImg = document.getElementById(`thumb-img-${i}`); 
                if (!thumbImg) continue;
                
                const c = document.createElement('canvas'); 
                c.width = state.frameWidth; 
                c.height = state.viewportHeight; 
                const ctx = c.getContext('2d');
                
                drawSlideGradient(ctx, i, state.frameWidth, state.viewportHeight);
                if (overlayCanvas) { 
                    ctx.drawImage(overlayCanvas, i * state.frameWidth, 0, state.frameWidth, state.viewportHeight, 0, 0, state.frameWidth, state.viewportHeight); 
                }
                thumbImg.src = c.toDataURL('image/png');
            }
        }

        // ==========================================================================
        // 5. STUDIO MASTER UNIFICATO: PAN, ZOOM E INTERFACCIA HD
        // ==========================================================================
        function initFabricCanvas() {
            if (fCanvas) return;
            fCanvas = new fabric.Canvas('fabric-canvas', { preserveObjectStacking: true });
            fCanvas.on('selection:created', syncUIControls); 
            fCanvas.on('selection:updated', syncUIControls); 
            fCanvas.on('selection:cleared', () => showSelectionPanels(null));
            
            fCanvas.on('object:modified', e => { 
                if(!applyTextWidthFromCanvasResize(e)) debouncedSyncPreview(); 
            });
            
            fCanvas.on('object:moving', e => { 
                const obj = e.target; 
                const center = fCanvas.getCenter(); 
                if (Math.abs(obj.top + (obj.height * obj.scaleY) / 2 - center.top) < 15) { 
                    obj.top = center.top - (obj.height * obj.scaleY) / 2; 
                } 
                debouncedSyncPreview(); 
            });
            
            if (!fabricUndoHookInstalled) { 
                fabricUndoHookInstalled = true; 
                fCanvas.on('mouse:down', e => { if (e.target) saveUndoSnapshot(); }); 
                fCanvas.on('object:added', updateUndoButtons); 
                fCanvas.on('object:removed', updateUndoButtons); 
                fCanvas.on('object:modified', updateUndoButtons); 
            }
        }

        window.openUnifiedStudio = async function(targetSlideIndex = -1) {
            initFabricCanvas(); 
            fCanvas.clear();
            
            const totalW = state.finalFramesCount * state.frameWidth; 
            fCanvas.setWidth(totalW); 
            fCanvas.setHeight(state.viewportHeight);
            populateSlideJumpers();

            // Sfondo ad Altissima Risoluzione (3x) per prevenire blur e sgranature (Anti-Blurry Fix)
            const HD_SCALE = 3;
            const tC = document.createElement('canvas'); 
            tC.width = totalW * HD_SCALE; 
            tC.height = state.viewportHeight * HD_SCALE; 
            const ctx = tC.getContext('2d');
            
            ctx.scale(HD_SCALE, HD_SCALE);
            ctx.fillStyle = '#ffffff'; 
            ctx.fillRect(0, 0, totalW, state.viewportHeight);

            for (let i = 0; i < state.finalFramesCount; i++) {
                const frameInfo = getFrameInfo(i); 
                const sliceX = i * state.frameWidth;
                
                if (frameInfo.type === 'image' && state.imgObj) {
                    const sourceX = ((frameInfo.imageIndex * state.frameWidth) - state.x) / state.scale; 
                    const sourceY = Math.abs(state.y) / state.scale;
                    const sourceW = state.frameWidth / state.scale; 
                    const sourceH = state.viewportHeight / state.scale;
                    
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(state.imgObj, sourceX, sourceY, sourceW, sourceH, sliceX, 0, state.frameWidth, state.viewportHeight);
                }
                
                if (i > 0) { 
                    ctx.save(); 
                    ctx.beginPath(); 
                    ctx.moveTo(sliceX, 0); 
                    ctx.lineTo(sliceX, state.viewportHeight); 
                    ctx.strokeStyle = '#0146bc'; 
                    ctx.lineWidth = 2; // Linea sottile ma netta grazie all'HD_SCALE
                    ctx.setLineDash([8, 8]); 
                    ctx.stroke(); 
                    ctx.restore(); 
                }
                
                ctx.save(); 
                ctx.fillStyle = '#eddc01'; 
                ctx.fillRect(sliceX + 12, 12, 65, 24); 
                ctx.fillStyle = '#0146bc'; 
                ctx.font = 'bold 11px Montserrat, sans-serif'; 
                ctx.fillText(`SLIDE ${i+1}`, sliceX + 18, 28); 
                ctx.restore();
            }

            document.getElementById('modal-editor').classList.remove('hidden'); 
            document.getElementById('modal-editor').classList.add('flex');
            enhanceEditorSidebar(); 
            showSelectionPanels(null);

            fabric.Image.fromURL(tC.toDataURL('image/png', 1.0), bgImg => {
                // Riconvertiamo il piano HD nella grandezza logica di fabric
                bgImg.set({ scaleX: 1 / HD_SCALE, scaleY: 1 / HD_SCALE, originX: 'left', originY: 'top' });

                fCanvas.setBackgroundImage(bgImg, () => {
                    if (state.globalOverlayJSON) {
                        const safeJson = cloneForUndo(state.globalOverlayJSON);
                        fCanvas.loadFromJSON(safeJson, () => { 
                            fCanvas.setBackgroundImage(bgImg, fCanvas.renderAll.bind(fCanvas)); 
                            setupLoad(); 
                        });
                    } else { 
                        fCanvas.renderAll(); 
                        setupLoad(); 
                    }
                });
            });

            function setupLoad() {
                syncSelectiveGradientUI(); 
                syncSelectiveGradientsToCanvas();
                if (targetSlideIndex >= 0 && targetSlideIndex < state.finalFramesCount) {
                    fitZoomToSlide(targetSlideIndex);
                } else {
                    fitZoomToAll();
                }
            }
        };

        window.setEditorZoom = function(zoomLevel, centerOnX = null, smooth = true) {
            if (!fCanvas) return; 
            zoomLevel = Math.max(0.2, Math.min(3.0, zoomLevel)); 
            state.editorZoom = zoomLevel;
            
            const baseW = state.finalFramesCount * state.frameWidth; 
            const baseH = state.viewportHeight; 
            const viewport = document.getElementById('canvas-viewport');
            
            let targetScrollX = 0; 
            let targetScrollY = 0;
            
            if (viewport) {
                if (centerOnX !== null) { 
                    targetScrollX = (centerOnX * zoomLevel) - (viewport.clientWidth / 2); 
                    targetScrollY = ((baseH / 2) * zoomLevel) - (viewport.clientHeight / 2); 
                } 
                else { 
                    const curCx = (viewport.scrollLeft + viewport.clientWidth / 2) / (fCanvas.getZoom() || 1); 
                    const curCy = (viewport.scrollTop + viewport.clientHeight / 2) / (fCanvas.getZoom() || 1); 
                    targetScrollX = (curCx * zoomLevel) - (viewport.clientWidth / 2); 
                    targetScrollY = (curCy * zoomLevel) - (viewport.clientHeight / 2); 
                }
            }
            
            fCanvas.setZoom(zoomLevel); 
            fCanvas.setWidth(baseW * zoomLevel); 
            fCanvas.setHeight(baseH * zoomLevel); 
            fCanvas.requestRenderAll();
            
            const label = document.getElementById('zoom-display-val'); 
            if (label) label.innerText = Math.round(zoomLevel * 100) + '%';
            
            if (viewport) { 
                viewport.scrollTo({ left: Math.max(0, targetScrollX), top: Math.max(0, targetScrollY), behavior: smooth ? 'smooth' : 'instant' }); 
            }
        };

        window.changeEditorZoom = function(delta) { 
            setEditorZoom((state.editorZoom || 1.0) + delta, null, false); 
        };

        window.fitZoomToSlide = function(slideIndex = null) {
            const viewport = document.getElementById('canvas-viewport'); 
            let targetZoom = 1.0;
            if (viewport && viewport.clientHeight > 100) { 
                targetZoom = Math.max(0.5, Math.min(2.0, (viewport.clientHeight - 80) / state.viewportHeight)); 
            }
            if (slideIndex === null) { 
                const obj = fCanvas.getActiveObject(); 
                slideIndex = obj ? Math.floor(obj.left / state.frameWidth) : 0; 
            }
            const centerOnX = (slideIndex * state.frameWidth) + (state.frameWidth / 2);
            setEditorZoom(targetZoom, centerOnX, true); 
            updateActiveSlideJumper(slideIndex);
        };

        window.fitZoomToAll = function() {
            const viewport = document.getElementById('canvas-viewport'); 
            const totalW = state.finalFramesCount * state.frameWidth; 
            let targetZoom = 0.5;
            if (viewport && viewport.clientWidth > 100) { 
                targetZoom = Math.max(0.25, Math.min(1.2, (viewport.clientWidth - 80) / totalW)); 
            }
            setEditorZoom(targetZoom, totalW / 2, true); 
            updateActiveSlideJumper(-1);
        };

        window.jumpToSlide = function(index) {

        };

            }); 
        }

        function populateSlideJumpers() {
            const container = document.getElementById('toolbar-slide-jumpers'); 
            if (!container) return; 
            container.innerHTML = '';
            for (let i = 0; i < state.finalFramesCount; i++) { 
                const btn = document.createElement('button'); 
                btn.type = 'button'; 
                btn.innerText = i + 1; 
                btn.onclick = () => jumpToSlide(i); 
                btn.className = 'slide-jump-btn px-2.5 py-1 rounded text-xs font-extrabold bg-gray-700 text-white hover:bg-gray-600 transition-all'; 
                container.appendChild(btn); 
            }
        }

        window.debouncedSyncPreview = function() {
            if (previewTimeout) clearTimeout(previewTimeout);
            previewTimeout = setTimeout(() => {

            enhanceEditorSidebar(); 
            const obj = fCanvas.getActiveObject();
            if (!obj || obj.isGradientLayer) return showSelectionPanels(null);
            
            // Gestione Dinamica UI in caso di Gruppi (Multi-selezione)

            const multiAlignPanel = document.getElementById('multi-align-panel');
            const title = document.getElementById('obj-ctrl-title');
            const btnCopyNext = document.getElementById('btn-copy-next');
            const btnCenterH = document.getElementById('btn-center-h');
            const btnCenterV = document.getElementById('btn-center-v');

            if (isMulti) {
                if (multiAlignPanel) { multiAlignPanel.classList.remove('hidden'); multiAlignPanel.classList.add('flex'); }
                if (title) title.innerText = `GRUPPO ELEMENTI (${obj._objects.length})`;
                if (btnCenterH) btnCenterH.classList.add('opacity-50', 'pointer-events-none');
                if (btnCenterV) btnCenterV.classList.add('opacity-50', 'pointer-events-none');
                if (btnCopyNext) btnCopyNext.classList.add('opacity-50', 'pointer-events-none');
            } else {
                if (multiAlignPanel) { multiAlignPanel.classList.add('hidden'); multiAlignPanel.classList.remove('flex'); }
                if (title) title.innerText = 'Azione su Elemento';
                if (btnCenterH) btnCenterH.classList.remove('opacity-50', 'pointer-events-none');
                if (btnCenterV) btnCenterV.classList.remove('opacity-50', 'pointer-events-none');
                if (btnCopyNext) btnCopyNext.classList.remove('opacity-50', 'pointer-events-none');
            }

            if (obj.isCustomTextAsset) {
                showSelectionPanels('text'); 
                obj.set({ lockUniScaling: false, lockScalingFlip: true, objectCaching: false }); 
                obj.setControlsVisibility({ mt: true, mb: true, ml: true, mr: true, tl: true, tr: true, bl: true, br: true, mtr: true });
                
                if (!quill) { 
                    quill = new Quill('#quill-editor', { modules: { toolbar: '#quill-toolbar' }, theme: 'snow' }); 
                    quill.on('text-change', () => scheduleTextAutoApply()); 
                }
                quill.root.innerHTML = obj.sourceHTML || '';
                
                if (obj.globalSettings) { 
                    document.getElementById('font-family').value = obj.globalSettings.font; 
                    document.getElementById('rng-fontsize').value = obj.globalSettings.size; 
                    document.getElementById('rng-lineheight').value = obj.globalSettings.lh; 
                    document.getElementById('rng-width').value = obj.globalSettings.width; 
                    document.getElementById('text-align-hidden').value = obj.globalSettings.align; 
                }
            } else if (obj.isDecorBox || obj.isDecorCircle) {
                showSelectionPanels('box'); 
                obj.set({ objectCaching: false, lockScalingFlip: true });
                document.getElementById('box-fill').value = obj.fill || '#ffffff'; 
                document.getElementById('rng-box-opacity').value = Math.round((obj.opacity == null ? 1 : obj.opacity) * 100);
                
                if (obj.isDecorBox) {
                    document.getElementById('radius-control-group').classList.remove('hidden'); 
                    document.getElementById('bars-control-group').classList.remove('hidden');
                    document.getElementById('rng-box-radius').value = obj.rx || 0; 
                    document.getElementById('box-bar-color').value = obj.customBoxBarColor || '#eddc01'; 
                    document.getElementById('rng-box-barwidth').value = obj.customBoxBarWidth || 8;
                    ['left', 'right', 'top', 'bottom'].forEach(d => {
                        document.getElementById('box-bar-' + d).checked = !!obj['customBoxBar' + d.charAt(0).toUpperCase() + d.slice(1)];
                    });
                } else { 
                    document.getElementById('radius-control-group').classList.add('hidden'); 
                    document.getElementById('bars-control-group').classList.add('hidden'); 
                }
            } else {
                showSelectionPanels('image');
            }
        }

        window.alignMultiple = function(mode) {
            const sel = fCanvas ? fCanvas.getActiveObject() : null;
            if (!sel || sel.type !== 'activeSelection') return;

            const selLeft = sel.left;
            const selWidth = sel.width;
            const selRight = selLeft + selWidth;
            const selCenter = selLeft + selWidth / 2;

            const targets = fCanvas.getActiveObjects();
            fCanvas.discardActiveObject(); 

            targets.forEach(obj => {
                const objW = obj.width * obj.scaleX;
                if (mode === 'left') {
                    obj.set('left', selLeft + objW / 2);
                } else if (mode === 'center') {
                    obj.set('left', selCenter);
                } else if (mode === 'right') {
                    obj.set('left', selRight - objW / 2);
                }
                obj.setCoords();
            });

            // Reseleziona il nuovo gruppo aggiornato
            const newSel = new fabric.ActiveSelection(targets, { canvas: fCanvas });
            fCanvas.setActiveObject(newSel);
            fCanvas.requestRenderAll();
            debouncedSyncPreview();
        };

        window.alignObject = function(mode) { 
            const obj = fCanvas ? fCanvas.getActiveObject() : null; 
            if (!obj || obj.type === 'activeSelection') return; 
            if (mode === 'centerH') { 
                const idx = Math.floor(obj.left / state.frameWidth); 
                obj.set('left', (idx * state.frameWidth) + (state.frameWidth / 2)); 
            } else {
                fCanvas.viewportCenterObjectV(obj); 
            }
            obj.setCoords(); 
            fCanvas.requestRenderAll(); 
            debouncedSyncPreview(); 
        };

        window.copySelectedObjectToNextSlide = function() { 
            const obj = fCanvas && fCanvas.getActiveObject(); 
            if (!obj || obj.type === 'activeSelection') return; 
            const idx = Math.floor(obj.left / state.frameWidth); 
            if (idx + 1 >= state.finalFramesCount) return; 
            
            obj.clone(c => { 
                c.set({ left: (obj.left || 0) + state.frameWidth, top: (obj.top || 0), evented: true }); 
                fCanvas.add(c); 
                fCanvas.setActiveObject(c); 
                fCanvas.requestRenderAll(); 
                debouncedSyncPreview(); 
            }, CUSTOM_FABRIC_PROPS); 
        };

        window.duplicateSelectedObject = function() { 
            const obj = fCanvas.getActiveObject(); 
            if (!obj) return; 
            
            // Supporto duplicazione interi gruppi (ActiveSelection)
            if (obj.type === 'activeSelection') {
                obj.clone(cloned => {
                    fCanvas.discardActiveObject();
                    cloned.canvas = fCanvas;
                    cloned.forEachObject(c => {
                        c.set({ left: c.left + 24, top: c.top + 24, evented: true });
                        fCanvas.add(c);
                    });
                    cloned.setCoords();
                    fCanvas.setActiveObject(cloned);
                    fCanvas.requestRenderAll();
                    debouncedSyncPreview();
                }, CUSTOM_FABRIC_PROPS);
                return;
            }

            obj.clone(c => { 
                c.set({ left: (obj.left || 0) + 24, top: (obj.top || 0) + 24, evented: true }); 
                fCanvas.add(c); 
                fCanvas.setActiveObject(c); 
                fCanvas.requestRenderAll(); 
                debouncedSyncPreview(); 
            }, CUSTOM_FABRIC_PROPS); 
        };

        window.bringSelectedForward = function() { const obj = fCanvas.getActiveObject(); if (obj) { fCanvas.bringForward(obj); fCanvas.requestRenderAll(); debouncedSyncPreview(); } };
        window.sendSelectedBackward = function() { const obj = fCanvas.getActiveObject(); if (obj) { fCanvas.sendBackwards(obj); fCanvas.requestRenderAll(); debouncedSyncPreview(); } };
        
        window.deleteSelectedObject = function() { 
            const obj = fCanvas ? fCanvas.getActiveObject() : null; 
            if (!obj || obj.isGradientLayer) return; 
            if (confirm('Cancellare gli elementi selezionati?')) { 
                // Permette di eliminare massivamente i gruppi

        function syncSelectiveGradientUI() {
            const tog = document.getElementById('gradient-slide-toggles'); 
            if (!tog) return; 
            tog.innerHTML = ''; 
            const active = state.globalGradientConfig.activeSlides || [];
            
            for (let i = 0; i < state.finalFramesCount; i++) { 
                const isChecked = active.includes(i);
                const b = document.createElement('button'); 
                b.innerText = i + 1; 
                b.className = `py-1.5 rounded text-xs font-bold border transition-all ${isChecked ? 'bg-brand-blue text-white shadow-md' : 'bg-gray-100 text-gray-600'}`; 
                b.onclick = () => toggleSlideGradient(i); 
                tog.appendChild(b); 
            }
            ['direction', 'size', 'color', 'opacity'].forEach(p => { 
                const el = document.getElementById('gradient-' + p); 
                if (el) el.value = state.globalGradientConfig[p]; 
            });
        }

        window.toggleSlideGradient = function(i) { 
            const active = state.globalGradientConfig.activeSlides; 
            const pos = active.indexOf(i); 
            if (pos !== -1) active.splice(pos, 1); 
            else active.push(i); 
            
            state.globalGradientConfig.enabled = active.length > 0; 
            syncSelectiveGradientUI(); 
            syncSelectiveGradientsToCanvas(); 
            debouncedSyncPreview(); 
        };

        window.selectAllGradientSlides = function(select) { 
            state.globalGradientConfig.activeSlides = select ? Array.from({ length: state.finalFramesCount }, (_, i) => i) : []; 
            state.globalGradientConfig.enabled = !!select; 
            syncSelectiveGradientUI(); 
            syncSelectiveGradientsToCanvas(); 
            debouncedSyncPreview(); 
        };

        window.updateSelectiveGradient = function(p, v) { 
            state.globalGradientConfig[p] = (p === 'size' || p === 'opacity') ? parseFloat(v) : v; 
            if (!state.globalGradientConfig.activeSlides.length) { 
                state.globalGradientConfig.activeSlides = [0]; 
                state.globalGradientConfig.enabled = true; 
            } 
            syncSelectiveGradientUI(); 
            syncSelectiveGradientsToCanvas(); 
            debouncedSyncPreview(); 
        };

        window.applyGradientColor = function(h) { 
            const c = document.getElementById('gradient-color'); 
            if (c) c.value = h; 
            updateSelectiveGradient('color', h); 
        };

        function syncSelectiveGradientsToCanvas() {
            if (!fCanvas) return; 
            fCanvas.getObjects().forEach(o => { if (o.isGradientLayer) fCanvas.remove(o); });
            
            const cfg = state.globalGradientConfig; 
            if (!cfg.enabled || !cfg.activeSlides.length) return fCanvas.requestRenderAll();
            
            const alpha = Math.max(0, parseFloat(cfg.opacity)) / 100;
            const c = (cfg.color || '#000').replace('#', ''); 
            const n = c.length === 3 ? c.split('').map(x => x + x).join('') : c.padEnd(6, '0'); 
            const r = parseInt(n.slice(0, 2), 16);
            const g = parseInt(n.slice(2, 4), 16);
            const b = parseInt(n.slice(4, 6), 16);

            const sol = `rgba(${r},${g},${b},${alpha})`; 
            const clr = `rgba(${r},${g},${b},0)`; 
            const sz = Math.max(1, parseFloat(cfg.size)); 
            const bleed = 2;

            cfg.activeSlides.forEach(idx => {
                let l = (idx * state.frameWidth) - bleed, t = -bleed, w = state.frameWidth + (bleed * 2), h = state.viewportHeight + (bleed * 2); 
                let grad;
                
                if (cfg.direction === 'full') grad = sol; 
                else if (cfg.direction === 'bottom') { 
                    const th = state.viewportHeight * (sz / 100); 
                    t = state.viewportHeight - th; 
                    h = th + bleed; 
                    grad = new fabric.Gradient({ type: 'linear', coords: { x1: 0, y1: 0, x2: 0, y2: h }, colorStops: [{ offset: 0, color: clr }, { offset: 1, color: sol }] }); 
                } else if (cfg.direction === 'top') { 
                    const th = state.viewportHeight * (sz / 100); 
                    h = th + bleed; 
                    grad = new fabric.Gradient({ type: 'linear', coords: { x1: 0, y1: 0, x2: 0, y2: h }, colorStops: [{ offset: 0, color: sol }, { offset: 1, color: clr }] }); 
                } else if (cfg.direction === 'left') { 
                    const tw = state.frameWidth * (sz / 100); 
                    w = tw + bleed; 
                    grad = new fabric.Gradient({ type: 'linear', coords: { x1: 0, y1: 0, x2: w, y2: 0 }, colorStops: [{ offset: 0, color: sol }, { offset: 1, color: clr }] }); 
                } else { 
                    const tw = state.frameWidth * (sz / 100); 
                    l = (idx * state.frameWidth) + state.frameWidth - tw; 
                    w = tw + bleed; 
                    grad = new fabric.Gradient({ type: 'linear', coords: { x1: 0, y1: 0, x2: w, y2: 0 }, colorStops: [{ offset: 0, color: clr }, { offset: 1, color: sol }] }); 
                }
                
                const rect = new fabric.Rect({ left: l, top: t, width: w, height: h, fill: grad, selectable: false, evented: false, isGradientLayer: true }); 
                fCanvas.add(rect); 
                fCanvas.sendToBack(rect);
            });
            fCanvas.requestRenderAll();
        }
